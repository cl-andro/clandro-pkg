name: Forge Core OS (aarch64)

on:
  workflow_dispatch:

jobs:
  build-core:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/termux/package-builder:latest
      options: --privileged
    steps:
      - name: Checkout Sovereign Code
        uses: actions/checkout@v6

      - name: Architect the Custom OS Directories
        run: |
          sudo mkdir -p /data/data/com.zk.clandro/files/usr
          sudo mkdir -p /data/data/com.zk.clandro/files/home
          sudo chown -R builder:builder /data/data/com.zk.clandro

      - name: Install the C++ Compiler (The Missing NDK)
        run: |
          export HOME=/home/builder
          ./scripts/setup-android-sdk.sh

      - name: Forge Core Dependencies (DB, XML, Scripting)
        run: |
          export HOME=/home/builder

          # Database & Scripting Dependencies
          ./build-package.sh -a aarch64 libdb
          ./build-package.sh -a aarch64 tcl
          ./build-package.sh -a aarch64 libsqlite
          ./build-package.sh -a aarch64 libexpat
          ./build-package.sh -a aarch64 gdbm

          # XML & Documentation Parsers
          ./build-package.sh -a aarch64 libicu
          ./build-package.sh -a aarch64 libxml2
          ./build-package.sh -a aarch64 libxslt
          ./build-package.sh -a aarch64 docbook-xml
          ./build-package.sh -a aarch64 docbook-xsl

      - name: Forge Python Engine (The AI Language)
        run: |
          export HOME=/home/builder

          # ARCHITECT OVERRIDE: Obliterate GUI dependencies safely (Regular Files Only)
          rm -f packages/python/*tkinter*.sh
          find packages -name "*fetchmailconf*" -exec rm -rf {} +
          find packages -type f -name "*.sh" -exec sed -i 's/python-tkinter//g' {} +
          sed -i 's/termux_error_exit "Python module library/echo "Bypassed GUI check: /g' packages/python/build.sh

          # Anti-Timeout: Start heartbeat to keep GitHub Actions alive
          while true; do echo "[HEARTBEAT] Still forging the Python Engine... $(date)"; sleep 120; done &
          HEARTBEAT_PID=$!

          ./build-package.sh -a aarch64 python

          # Terminate heartbeat when complete
          kill $HEARTBEAT_PID

      - name: Generate APT Index
        run: |
          export HOME=/home/builder
          sudo apt-get update && sudo apt-get install -y dpkg-dev
          mkdir -p output
          cd output

          # ARCHITECT OVERRIDE: Bulletproof POSIX renaming to bypass GitHub's Windows NTFS restrictions
          find . -name "*:*" -type f | while read -r file; do
            newfile=$(echo "$file" | tr ':' '_')
            mv "$file" "$newfile"
          done

          dpkg-scanpackages -m . > Packages
          gzip -9c Packages > Packages.gz

      - name: Upload Core OS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cl-andro-core-debs-aarch64
          path: output/

      - name: Publish & Sign Packages
        if: success()
        env:
          CL_ANDRO_PAT: ${{ secrets.CL_ANDRO_PAT }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          ./scripts/publish-repo-ci.sh
