name: Forge Complex (aarch64)

on:
  workflow_dispatch:

jobs:
  build-complex:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/termux/package-builder:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Setup directories
        run: |
          sudo mkdir -p /data/data/com.zk.clandro/files/usr
          sudo mkdir -p /data/data/com.zk.clandro/files/home
          sudo chown -R builder:builder /data/data/com.zk.clandro

      - name: Install NDK
        run: |
          export HOME=/home/builder
          ./scripts/setup-android-sdk.sh

      - name: Build imagemagick
        run: |
          export HOME=/home/builder

          # Anti-Timeout: Start heartbeat to keep GitHub Actions alive
          while true; do echo "[HEARTBEAT] Still forging imagemagick... $(date)"; sleep 120; done &
          HEARTBEAT_PID=$!

          ./build-package.sh -a aarch64 imagemagick

          # Terminate heartbeat when complete
          kill $HEARTBEAT_PID

      - name: Build ffmpeg
        run: |
          export HOME=/home/builder

          # Anti-Timeout: Start heartbeat to keep GitHub Actions alive
          while true; do echo "[HEARTBEAT] Still forging ffmpeg... $(date)"; sleep 120; done &
          HEARTBEAT_PID=$!

          ./build-package.sh -a aarch64 ffmpeg

          # Terminate heartbeat when complete
          kill $HEARTBEAT_PID

      - name: Sanitize filenames
        if: success()
        run: |
          for f in output/*:*.deb; do
            [ -e "$f" ] && mv "$f" "$(echo "$f" | tr ':' '_')"
          done

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: cl-andro-complex
          path: output/*.deb

      - name: Publish & Sign
        if: success()
        env:
          CL_ANDRO_PAT: ${{ secrets.CL_ANDRO_PAT }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          ./scripts/publish-repo-ci.sh

      - name: Autopsy on failure
        if: failure()
        run: |
          echo "========== CONFIG.LOG AUTOPSY =========="
          find /home/builder/.termux-build/ -name "config.log" -exec cat {} +
